<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Speedometer HUD</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <main class="speedometer-neon">
        
        <div class="gauge-ring">
            
            <div class="gauge-center">
                
                <div class="speed-display">
                    <span id="speed" class="speed-number">0</span>
                    <span class="speed-unit">KMH</span>
                </div>
                
                <div class="rpm-display">
                    <span id="rpm">0.00</span> RPM
                </div>
                
                <div class="vitals-row">
                    <div class="vital-item">
                        <span class="icon">⛽</span>
                        <span id="fuel">100%</span>
                    </div>
                    <div class="vital-item">
                        <span class="icon">⚙️</span>
                        <span id="gear">N</span>
                    </div>
                    <div class="vital-item">
                        <span class="icon">🔧</span>
                        <span id="health">100%</span>
                    </div>
                </div>

                <div style="display:none;">
                    <span id="engine"></span>
                    <span id="headlights"></span>
                    <span id="indicators"></span>
                    <span id="seatbelts"></span>
                    <span id="odometer"></span>
                </div>

            </div>
        </div>
    </main>
    <script src="/script.js"></script>
</body>
</html>
