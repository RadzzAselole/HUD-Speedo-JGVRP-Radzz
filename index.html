<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedometer Testing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="hud-dashboard">
    
    <div class="top-row">
        <div class="hud-box small-box">
            <div class="icon-circle" id="lock"><i class="fas fa-lock"></i></div>
        </div>
        <div class="hud-box rpm-bar">
            <span class="label">RPM</span>
            <span class="value digital-font" id="rpm">0000</span>
        </div>
    </div>

    <div class="middle-row">
        <div class="hud-box speed-box">
            <div class="speed-numbers" id="speed-digits-container">
                <span class="digit">0</span>
                <span class="digit">0</span>
                <span class="digit">0</span>
            </div>
                <span class="label-large" id="speed-unit">KMH</span>
        </div>

        <div class="right-column">
            <div class="hud-box small-box">
                <span class="label">GEAR</span>
                <span class="value" id="gear">&nbsp;</span>
            </div>
            <div class="hud-box small-box">
                <span class="label">HEALTH</span>
                <span class="value" id="health">&nbsp;</span>
            </div>
            <div class="hud-box small-box">
                <span class="label">FUEL LEVEL</span>
                <span class="value" id="fuel">&nbsp;</span>
            </div>
        </div>
    </div>

    <div class="hud-box bottom-indicators">
        <div class="icon-circle" id="indicator-left"><i class="fas fa-arrow-left"></i></div>
        <div class="icon-circle" id="engine"><i class="fas fa-cogs"></i></div>
        <div class="icon-circle" id="headlights"><i class="fas fa-lightbulb"></i></div>
        <div class="icon-circle" id="seatbelts"><i class="fas fa-user-shield"></i></div>
        <div class="icon-circle" id="indicator-right"><i class="fas fa-arrow-right"></i></div>
    </div>
</main>
    <script src="/script.js"></script>
</body>
</html>
